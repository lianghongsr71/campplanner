server {
    listen 80;

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /home-page {
        return 302 /home-page.html;
    }
    location = /my-summer-plan {
        return 302 /my-summer-plan.html;
    }
    location = /admin-dashboard {
        return 302 /admin-dashboard.html;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ $uri.html =404;
    }
}
