version: "3"

services:

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/conf:/etc/nginx/conf.d
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: camps
      POSTGRES_USER: campuser
      POSTGRES_PASSWORD: camppass
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: campuser
      POSTGRES_PASSWORD: camppass
      POSTGRES_DB: camps
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
