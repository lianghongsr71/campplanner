version: "3"

services:

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/conf:/etc/nginx/conf.d
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: campuser
      POSTGRES_PASSWORD: camppass
      POSTGRES_DB: camps
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    restart: unless-stopped
